name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Skip on dependabot (no secret access)
        if: github.actor == 'dependabot[bot]'
        run: echo "Dependabot PR — gitleaks scan skipped (no repo secrets available to bot runs)."
      - uses: actions/checkout@v7
        if: github.actor != 'dependabot[bot]'
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        if: github.actor != 'dependabot[bot]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  build:
    name: lint + test + audit + build + sbom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: npm audit (high)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Regenerate SBOM
        run: npm run sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          if-no-files-found: error
